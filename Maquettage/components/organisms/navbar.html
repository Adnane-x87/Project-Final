<!-- Navbar Organism -->
<header class="fixed top-0 z-50 w-full border-b border-slate-100 bg-white/95 backdrop-blur-xl">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-20 items-center justify-between">
      
      <!-- Logo -->
      <div class="relative flex h-20 flex-shrink-0 items-center">
        [[logo]]
      </div>

      <!-- Desktop Nav -->
      <nav class="hidden items-center gap-8 md:flex">
        [[navLinks]]
      </nav>

      <!-- CTA -->
      <div class="hidden items-center gap-6 md:flex">
        [[ctaButtons]]
      </div>

      <!-- Mobile Toggle -->
      <div class="flex md:hidden">
        <button onclick="toggleMobileMenu()" class="p-2 text-slate-400 hover:text-slate-600">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden border-t border-slate-100 bg-white md:hidden">
    <div class="space-y-3 px-4 py-6">
      [[mobileLinks]]
    </div>
  </div>
</header>
