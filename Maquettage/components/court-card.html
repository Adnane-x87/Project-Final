<div class="card court-card">
  <div class="court-img" style="background-image: [[bg]];">
    [[icon]]
    <div class="court-badge">
      <span class="badge [[status]]">[[statusLabel]]</span>
    </div>
  </div>
  <div class="court-info">
    <div class="court-name">[[name]]</div>
    <p class="text-sm text-muted">[[description]]</p>
    <div class="court-meta">
      <div class="court-meta-item">👥 <span>[[players]]</span></div>
      <div class="court-meta-item">📐 <span>[[size]]</span></div>
      <div class="court-meta-item">🌙 <span>Éclairé</span></div>
    </div>
    <div class="flex" style="align-items:center; justify-content:space-between;">
      <div class="court-price">[[price]] MAD <span>/heure</span></div>
      <a href="[[link]]" class="btn btn-primary btn-sm">Réserver →</a>
    </div>
  </div>
</div>
